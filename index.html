<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Divinetots | Electronic Hub</title>
    <!-- <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    /> -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- navbar -->
    <header>
      <div class="hamburger">
        <i class="fa-solid fa-bars"></i>
      </div>
      <div class="name">Divinetots</div>
      <div class="user-actions">
        <i class="fa-solid fa-user"></i>
      </div>
      <nav>
        <div>
          <h1>D</h1>
          <div id="icons">
            <div>
              <i class="fa-solid fa-house"></i>
              <p>Home</p>
            </div>
            <div>
              <i class="fa-solid fa-border-all"></i>
              <p>Categories</p>
            </div>
            <div>
              <i class="fa-solid fa-cart-shopping"></i>
              <p>Cart</p>
            </div>
            <div>
              <i class="fa-solid fa-tag"></i>
              <p>Deals</p>
            </div>
            <div>
              <i class="fa-solid fa-heart"></i>
              <p>Wishlist</p>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <!-- hero section -->
    <div class="main-content">
      <div class="top-search">
        <h1>Divinetots</h1>
        <div>
          <i class="fa-solid fa-search"></i>
          <input
            class="search-bar"
            type="search"
            placeholder="Search Products,brands,specs...."
          />
        </div>
      </div>
      <div class="hero-section">
        <div class="hero-content">
          <div class="hero-left">
            <div class="badge">
              <h3>AUTHORIZED DEALER</h3>
            </div>
            <h1>
              Premium <br />
              Cooling Solutions
            </h1>
            <h3 class="subtle">
              Experience unmatched durability with our latest range of genuine
              ACs and Inverters. Engineered for extreme reliability.
            </h3>
            <div>
              <button class="shop-now-btn">
                Shop Now <span><i class="fa-solid fa-arrow-right"></i></span>
              </button>
            </div>
          </div>
          <div class="hero-right">
            <img src="/images/hisense ac.png" alt="Hero Image" width="500px" />
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://kit.fontawesome.com/d5c2afb46b.js"
      crossorigin="anonymous"
    ></script>

    <script src="app.js"></script>

    <!-- <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

      crossorigin="anonymous"
    ></script> -->
  </body>
</html>
